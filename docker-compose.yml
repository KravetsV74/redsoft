version: '2'

volumes:
  twnextcloud:
  db:

services:
  db:
    image: mysql
    restart: unless-stopped
    volumes:
      - /opt:/opt
      - db:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=P@ssw0rd
      - MYSQL_PASSWORD=P@ssw0rd
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud

  app:
    image: nextcloud
    restart: unless-stopped
    ports:
      - "8081:80"
    links:
      - db
    volumes:
      - /opt:/opt
      - twnextcloud:/var/www/html
    environment:
      - MYSQL_PASSWORD=P@ssw0rd
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_HOST=db
